<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080810">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="VOZI">
<link rel="manifest" href="manifest.json">
<title>VOZI — Asistente Personal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --bg:#080810;--s1:#0f0f1a;--s2:#171725;--s3:#1f1f30;
  --b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.11);--b3:rgba(255,255,255,0.18);
  --txt:#eeeef5;--muted:rgba(238,238,245,0.42);--dim:rgba(238,238,245,0.2);
  --accent:#7c6aff;--accent2:#a78bfa;--glow:rgba(124,106,255,0.22);
  --green:#34d399;--amber:#fbbf24;--red:#f87171;--blue:#60a5fa;
  --mono:'DM Mono',monospace;--sans:'Syne',sans-serif;--r:12px;--r2:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--sans);overflow:hidden}
.app{display:flex;flex-direction:column;height:100dvh;max-width:520px;margin:0 auto}

/* HEADER */
.hdr{padding:12px 16px 10px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--b1);flex-shrink:0}
.logo-ring{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--accent);flex-shrink:0}
.hdr-name{font-size:15px;font-weight:800;letter-spacing:-0.5px;flex:1}
.hdr-name span{color:var(--accent)}
.nav{display:flex;gap:2px;background:var(--s1);border-radius:10px;padding:3px;border:1px solid var(--b1)}
.nav-btn{font-family:var(--sans);font-size:10px;font-weight:500;padding:5px 7px;border-radius:7px;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.nav-btn.active{background:var(--s3);color:var(--txt)}
.hdr-pill{font-family:var(--mono);font-size:10px;padding:4px 8px;border-radius:20px;border:1px solid var(--b2);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.hdr-pill.on{border-color:rgba(52,211,153,.4);color:var(--green)}
.hdr-pill.ai-on{border-color:rgba(124,106,255,.4);color:var(--accent2)}

/* PAGES */
.page{display:none;flex:1;flex-direction:column;overflow:hidden}
.page.active{display:flex}

/* CONVERSATION */
.convo{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
.convo::-webkit-scrollbar{width:3px}
.convo::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
.bubble{max-width:90%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.6}
.bubble.user{background:var(--accent);color:#fff;border-radius:14px 4px 14px 14px;align-self:flex-end}
.bubble.ai{background:var(--s2);border:1px solid var(--b1);border-radius:4px 14px 14px 14px;align-self:flex-start;color:var(--txt)}
.bubble.system{background:transparent;border:1px solid var(--b1);color:var(--muted);font-family:var(--mono);font-size:10px;align-self:center;border-radius:20px;padding:5px 12px;max-width:96%;text-align:center}
.bub-label{font-family:var(--mono);font-size:9px;color:var(--accent2);letter-spacing:.5px;margin-bottom:4px}
.think-row{display:flex;gap:4px;align-items:center}
.td{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:td 1.2s infinite}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes td{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.chip{font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid var(--b2);background:var(--s3);color:var(--accent2);cursor:pointer;transition:all .15s}
.chip:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip.g{border-color:rgba(52,211,153,.4);color:var(--green);background:rgba(52,211,153,.07);cursor:default}
.chip.warn{border-color:rgba(251,191,36,.4);color:var(--amber);background:rgba(251,191,36,.07);cursor:default}

/* MIC AREA */
.mic-area{padding:10px 16px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;border-top:1px solid var(--b1);flex-shrink:0}
.waveform{display:flex;align-items:center;gap:3px;height:22px;opacity:0;transition:opacity .3s}
.waveform.on{opacity:1}
.wb{width:3px;border-radius:2px;background:var(--accent)}
.waveform.on .wb{animation:wv 1s infinite ease-in-out}
.wb:nth-child(1){height:6px;animation-delay:0s}.wb:nth-child(2){height:13px;animation-delay:.1s}
.wb:nth-child(3){height:20px;animation-delay:.2s}.wb:nth-child(4){height:15px;animation-delay:.3s}
.wb:nth-child(5){height:24px;animation-delay:.15s}.wb:nth-child(6){height:17px;animation-delay:.25s}
.wb:nth-child(7){height:10px;animation-delay:.05s}
@keyframes wv{0%,100%{transform:scaleY(.35)}50%{transform:scaleY(1)}}
.mic-row{display:flex;align-items:center;gap:10px;width:100%}
.mic-btn{width:56px;height:56px;border-radius:50%;background:var(--s2);border:1.5px solid var(--b2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .2s;flex-shrink:0;outline:none;position:relative}
.mic-btn::before{content:'';position:absolute;inset:-6px;border-radius:50%;border:1px solid var(--accent);opacity:0;transition:opacity .3s}
.mic-btn.on{background:var(--accent);border-color:var(--accent);box-shadow:0 0 24px var(--glow);animation:mp 1.5s infinite}
.mic-btn.on::before{opacity:.4;animation:mr 2s infinite}
@keyframes mp{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes mr{0%{transform:scale(1);opacity:.4}100%{transform:scale(1.5);opacity:0}}
.txt-wrap{flex:1;position:relative}
.txt-in{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);padding:10px 38px 10px 14px;font-family:var(--mono);font-size:13px;color:var(--txt);outline:none;resize:none;line-height:1.5;max-height:90px;min-height:40px}
.txt-in:focus{border-color:var(--accent)}
.txt-in::placeholder{color:var(--dim)}
.send-btn{position:absolute;right:7px;bottom:7px;width:26px;height:26px;border-radius:7px;background:var(--accent);border:none;color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mic-hint{font-family:var(--mono);font-size:10px;color:var(--muted);text-align:center}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;flex-shrink:0}
.cal-nav-btn{background:none;border:1px solid var(--b2);color:var(--muted);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav-btn:hover{color:var(--txt);border-color:var(--b3)}
.cal-month{font-size:15px;font-weight:700;text-transform:capitalize}
.cal-sync-btn{font-family:var(--mono);font-size:10px;padding:4px 8px;border-radius:8px;border:1px solid var(--b2);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.cal-sync-btn:hover{color:var(--green);border-color:rgba(52,211,153,.4)}
.cal-grid{padding:0 12px;flex-shrink:0}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:4px}
.cal-dow span{font-family:var(--mono);font-size:10px;color:var(--muted);padding:3px 0}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day{aspect-ratio:1;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;position:relative;border:1px solid transparent}
.cal-day:hover{background:var(--s2)}
.cal-day.other{color:var(--dim)}
.cal-day.today{border-color:var(--accent);color:var(--accent)}
.cal-day.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.cal-day.has-events::after{content:'';position:absolute;bottom:2px;width:4px;height:4px;border-radius:50%;background:var(--amber)}
.cal-day.today.has-events::after,.cal-day.selected.has-events::after{background:#fff}
.cal-evlist{flex:1;overflow-y:auto;padding:10px 16px;display:flex;flex-direction:column;gap:7px}
.cal-evlist-hdr{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:2px;flex-shrink:0}
.ev-item{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:9px 13px;display:flex;align-items:flex-start;gap:9px;transition:border-color .15s}
.ev-item:hover{border-color:var(--b2)}
.ev-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ev-info{flex:1}
.ev-title{font-size:13px;font-weight:500;margin-bottom:1px}
.ev-time{font-family:var(--mono);font-size:10px;color:var(--muted)}
.ev-src{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(52,211,153,.1);color:var(--green);flex-shrink:0;align-self:center}
.no-ev{color:var(--dim);font-size:12px;text-align:center;padding:20px 0}

/* PROJECTS */
.pg-hdr{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding:14px 16px 0}
.pg-hdr-title{font-size:15px;font-weight:700}
.add-btn{font-family:var(--mono);font-size:10px;padding:5px 10px;border-radius:8px;border:1px solid var(--b2);background:transparent;color:var(--accent2);cursor:pointer;transition:all .15s}
.add-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.proj-wrap{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.proj-wrap::-webkit-scrollbar{width:3px}
.proj-wrap::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
.proj-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);padding:13px 15px;cursor:pointer;transition:border-color .15s}
.proj-card:hover{border-color:var(--b2)}
.proj-top{display:flex;align-items:flex-start;gap:9px;margin-bottom:9px}
.proj-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.proj-meta{flex:1}
.proj-name{font-size:14px;font-weight:600;margin-bottom:1px}
.proj-desc{font-size:11px;color:var(--muted);line-height:1.4}
.pstats{display:flex;gap:7px;margin-bottom:7px}
.pstat{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:4px;background:var(--s2)}
.pstat.ok{color:var(--green);background:rgba(52,211,153,.1)}
.pstat.pend{color:var(--amber);background:rgba(251,191,36,.1)}
.pbar{height:4px;background:var(--s3);border-radius:4px;overflow:hidden}
.pbar-fill{height:100%;border-radius:4px;background:var(--accent);transition:width .4s}
.stask-list{margin-top:9px;display:flex;flex-direction:column;gap:3px;display:none}
.proj-card.expanded .stask-list{display:flex}
.stask{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid var(--b1);font-size:12px}
.stask:last-child{border-bottom:none}
.stask-cb{width:15px;height:15px;border-radius:4px;border:1px solid var(--b3);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .15s}
.stask-cb.done{background:var(--green);border-color:var(--green);color:var(--bg)}
.stask-txt{flex:1}.stask-txt.done{text-decoration:line-through;color:var(--muted)}

/* TASKS */
.tasks-filters{display:flex;gap:5px;padding:10px 16px 0;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.tasks-filters::-webkit-scrollbar{display:none}
.tf{font-family:var(--mono);font-size:10px;padding:4px 9px;border-radius:20px;border:1px solid var(--b2);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s}
.tf.active{background:var(--accent);border-color:var(--accent);color:#fff}
.tasks-list{flex:1;overflow-y:auto;padding:10px 16px;display:flex;flex-direction:column;gap:7px}
.tasks-list::-webkit-scrollbar{width:3px}
.tasks-list::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
.task-item{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:11px 13px;display:flex;align-items:flex-start;gap:9px;transition:border-color .15s}
.task-item:hover{border-color:var(--b2)}
.task-cb{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--b3);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s}
.task-cb.done{background:var(--green);border-color:var(--green);color:var(--bg)}
.task-body{flex:1;min-width:0}
.task-title{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:3px}
.task-title.done{text-decoration:line-through;color:var(--muted)}
.task-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.tbadge{font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:4px}
.pri-alta{background:rgba(248,113,113,.15);color:var(--red)}
.pri-media{background:rgba(251,191,36,.12);color:var(--amber)}
.pri-baja{background:rgba(96,165,250,.12);color:var(--blue)}
.date-badge{font-family:var(--mono);font-size:10px;color:var(--dim)}
.proj-badge{font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:4px;background:var(--s3);color:var(--accent2)}
.gcal-badge{font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(52,211,153,.1);color:var(--green)}
.task-del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;padding:0 2px;transition:color .15s;flex-shrink:0}
.task-del:hover{color:var(--red)}
.overdue{border-left:2px solid var(--red)}
.due-today{border-left:2px solid var(--amber)}

/* EMPTY */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--dim);padding:40px 24px;text-align:center;font-size:13px;line-height:1.6}
.empty-icon{font-size:36px;opacity:.2}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:20px 20px 0 0;padding:22px;width:100%;max-width:520px;animation:su .22s ease}
@keyframes su{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h3{font-size:15px;font-weight:700;margin-bottom:5px}
.modal p{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:12px}
.modal input{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:10px 12px;font-family:var(--mono);font-size:12px;color:var(--txt);outline:none;margin-bottom:9px}
.modal input:focus{border-color:var(--accent)}
.modal-link{font-size:11px;color:var(--accent2);margin-bottom:12px;display:block;text-decoration:none}
.modal-btns{display:flex;gap:8px;margin-top:4px}
.mbtn{flex:1;font-family:var(--sans);font-size:13px;font-weight:600;padding:10px;border-radius:10px;border:none;cursor:pointer;transition:all .15s}
.mbtn.cancel{background:var(--s2);color:var(--muted);border:1px solid var(--b2)}
.mbtn.save{background:var(--accent);color:#fff}
.mbtn.save:hover{background:var(--accent2)}
.gcal-conn-btn{width:100%;padding:11px;border-radius:10px;border:1px solid rgba(52,211,153,.3);background:rgba(52,211,153,.07);color:var(--green);font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;margin-bottom:9px}
.gcal-conn-btn:hover{background:rgba(52,211,153,.14)}
.gcal-info{display:none;margin-bottom:10px;padding:9px 13px;background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.22);border-radius:9px;font-size:12px;color:var(--green)}
.gcal-disc{width:100%;padding:9px;border-radius:9px;border:1px solid var(--b2);background:transparent;color:var(--muted);font-family:var(--sans);font-size:12px;cursor:pointer;display:none}

/* STATUS + TOAST */
.statusbar{padding:6px 16px;display:flex;align-items:center;gap:6px;flex-shrink:0;border-top:1px solid var(--b1)}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sdot.ok{background:var(--green)}.sdot.warn{background:var(--amber)}.sdot.err{background:var(--red)}
.stext{font-family:var(--mono);font-size:10px;color:var(--muted);flex:1}
.toast{position:fixed;bottom:65px;left:50%;transform:translateX(-50%) translateY(16px);opacity:0;background:var(--s3);border:1px solid var(--b2);border-radius:20px;padding:7px 15px;font-size:12px;font-family:var(--mono);z-index:300;transition:all .22s;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>
<div class="app">

<header class="hdr">
  <div class="logo-ring">V</div>
  <span class="hdr-name">VO<span>ZI</span></span>
  <nav class="nav">
    <button class="nav-btn active" onclick="gotoPage('voice',this)">🎙 Voz</button>
    <button class="nav-btn" onclick="gotoPage('cal',this)">📅 Cal</button>
    <button class="nav-btn" onclick="gotoPage('proj',this)">📁 Proj</button>
    <button class="nav-btn" onclick="gotoPage('tasks',this)">✅ Tasks</button>
  </nav>
  <button class="hdr-pill" id="gcalPill" onclick="openModal('gcal')">Google</button>
</header>

<!-- VOICE PAGE -->
<div class="page active" id="page-voice">
  <div class="convo" id="convo"></div>
  <div class="mic-area">
    <div class="waveform" id="waveform">
      <div class="wb"></div><div class="wb"></div><div class="wb"></div>
      <div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div>
    </div>
    <div class="mic-row">
      <button class="mic-btn" id="micBtn" onclick="toggleMic()" aria-label="Micrófono">🎙</button>
      <div class="txt-wrap">
        <textarea class="txt-in" id="txtIn" placeholder="O escribe aquí..." rows="1"
          oninput="autoH(this)"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitText()}"></textarea>
        <button class="send-btn" onclick="submitText()">↑</button>
      </div>
    </div>
    <span class="mic-hint" id="micHint">toca para hablar</span>
  </div>
</div>

<!-- CALENDAR PAGE -->
<div class="page" id="page-cal">
  <div class="cal-nav">
    <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
    <span class="cal-month" id="calMonth"></span>
    <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
    <button class="cal-sync-btn" onclick="loadGCalEvents()">↻ Sync</button>
  </div>
  <div class="cal-grid">
    <div class="cal-dow"><span>Lu</span><span>Ma</span><span>Mi</span><span>Ju</span><span>Vi</span><span>Sá</span><span>Do</span></div>
    <div class="cal-days" id="calDays"></div>
  </div>
  <div class="cal-evlist" id="calEvents"></div>
</div>

<!-- PROJECTS PAGE -->
<div class="page" id="page-proj">
  <div class="pg-hdr">
    <span class="pg-hdr-title">Proyectos</span>
    <button class="add-btn" onclick="openModal('proj')">+ Nuevo</button>
  </div>
  <div class="proj-wrap" id="projList"></div>
</div>

<!-- TASKS PAGE -->
<div class="page" id="page-tasks">
  <div class="pg-hdr"><span class="pg-hdr-title">Tareas</span></div>
  <div class="tasks-filters">
    <button class="tf active" onclick="filterTasks('all',this)">Todas</button>
    <button class="tf" onclick="filterTasks('hoy',this)">Hoy</button>
    <button class="tf" onclick="filterTasks('pend',this)">Pendientes</button>
    <button class="tf" onclick="filterTasks('alta',this)">🔴 Alta</button>
    <button class="tf" onclick="filterTasks('done',this)">✓ Hechas</button>
  </div>
  <div class="tasks-list" id="tasksList"></div>
</div>

<div class="statusbar">
  <div class="sdot warn" id="sdot"></div>
  <span class="stext" id="stext">Iniciando…</span>
</div>

<!-- MODAL GOOGLE CALENDAR -->
<div class="overlay" id="modal-gcal">
  <div class="modal">
    <h3>Google Calendar</h3>

async function askGemini(userText){
  const today = new Date().toISOString().split('T')[0];
  const dayName = new Date().toLocaleDateString('es-ES',{weekday:'long'});
  const projects = DB.projects.map(p=>p.name).join(', ')||'ninguno';
  const gcalStatus = gcalToken ? 'conectado' : 'no conectado';

  const prompt = `Eres VOZI, asistente personal en español, conciso y motivador.
HOY ES: ${today} (${dayName}). Zona horaria: Europa/Madrid.
Proyectos del usuario: ${projects}.
Google Calendar: ${gcalStatus}.

Analiza el mensaje y responde ÚNICAMENTE con JSON válido sin markdown:
{
  "intent": "crear_tarea"|"crear_recordatorio"|"crear_proyecto"|"consulta"|"completar_tarea"|"motivacion"|"otro",
  "title": "título claro máx 60 chars",

  "time": "HH:MM o null",
  "priority": "alta"|"media"|"baja",
  "project": "nombre proyecto existente o null",

  "add_to_gcal": true/false,
  "response": "Respuesta natural en español máx 2 frases. Si creas algo confirma con entusiasmo. Si hay fecha dila."
}

REGLAS DE FECHA (muy importante):
- "mañana" = ${new Date(Date.now()+86400000).toISOString().split('T')[0]}

- "próximo lunes/martes/etc" = calcula la fecha exacta desde hoy
- "esta tarde" = hoy con hora 17:00 o la que digan
- "en X horas" = calcula la hora exacta
- add_to_gcal=true solo si hay fecha/hora Y Google Calendar está conectado

Mensaje del usuario: "${userText}"`;

  const res = await fetch(GEMINI_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      contents:[{parts:[{text: prompt}]}],
      generationConfig:{temperature:0.3, maxOutputTokens:500}
    })
  });
  if(!res.ok) throw new Error('Gemini error '+res.status);
  const data = await res.json();

/* ═══════════════════════════════════
   GOOGLE CALENDAR API
═══════════════════════════════════ */
async function createGCalEvent(task){
  if(!gcalToken||!task.date) return null;
  const startDT = task.date+'T'+(task.time||'09:00')+':00';
  const endDT   = task.date+'T'+(task.time ? addHour(task.time) : '10:00')+':00';
  const body = {
    summary: task.title,
    description: (task.project?'Proyecto: '+task.project+'\n':'')+'Creado por VOZI',
    start:{dateTime:startDT, timeZone:'Europe/Madrid'},
    end:  {dateTime:endDT,   timeZone:'Europe/Madrid'},
    reminders:{useDefault:false, overrides:[{method:'popup',minutes:10}]}
  };
  try{
    const r = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+gcalToken},
      body: JSON.stringify(body)
    });
    if(r.status===401){ gcalToken=''; localStorage.removeItem('vozi_gcal_token'); updateGCalUI(false); return null; }
    const d = await r.json(); return d.id||null;
  }catch(e){ return null; }
}

async function loadGCalEvents(){
  if(!gcalToken){ toast('Conecta Google Calendar primero'); return; }
  setStatus('Sincronizando calendario…','ok');
  const now=new Date();
  const maxTime=new Date(now.getFullYear(),now.getMonth()+3,1).toISOString();
  try{
    const r = await fetch(
      `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${now.toISOString()}&timeMax=${maxTime}&singleEvents=true&orderBy=startTime&maxResults=100`,
      {headers:{Authorization:'Bearer '+gcalToken}}
    );
    if(r.status===401){ gcalToken=''; localStorage.removeItem('vozi_gcal_token'); updateGCalUI(false); return; }
    const data = await r.json();
    if(!data.items){ updateStatus(); return; }
    // Remove old gcal events, re-add fresh
    DB.events = DB.events.filter(e=>e.type!=='gcal');
    data.items.forEach(ev=>{
      const date=(ev.start.date||(ev.start.dateTime||'').split('T')[0]);
      const time=ev.start.dateTime?ev.start.dateTime.split('T')[1].substring(0,5):null;
      DB.events.push({id:'gc_'+ev.id,gcalId:ev.id,title:ev.summary||'Sin título',date,time,type:'gcal',done:false});
    });
    saveDB(); renderCal();
    toast('📅 Calendario sincronizado ('+data.items.length+' eventos)');
    updateStatus();
  }catch(e){ setStatus('Error sincronizando','err'); }
}

function addHour(t){ const[h,m]=t.split(':').map(Number); return String((h+1)%24).padStart(2,'0')+':'+String(m).padStart(2,'0'); }

const SRec = window.SpeechRecognition||window.webkitSpeechRecognition;

function toggleMic(){
  if(!SRec){ toast('Usa Chrome o Edge para voz'); return; }
  if(isListening){ stopMic(); return; }
  navigator.mediaDevices.getUserMedia({audio:true})
    .then(s=>{ s.getTracks().forEach(t=>t.stop()); startMic(); })
    .catch(()=>{ toast('Permiso de micrófono denegado'); });
}

function startMic(){
  recognition=new SRec(); recognition.lang='es-ES'; recognition.continuous=true; recognition.interimResults=true;
  currentLive='';
  recognition.onresult=e=>{
    let fin='',int='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      e.results[i].isFinal?(fin+=t):(int+=t);
    }
    if(fin) currentLive+=fin;
    updateLive(currentLive+(int?' '+int:''));
  };
  recognition.onerror=e=>{ if(e.error!=='no-speech'){ stopMic(); }};
  recognition.onend=()=>{ if(isListening) recognition.start(); };
  recognition.start();
  isListening=true;
  document.getElementById('micBtn').classList.add('on');
  document.getElementById('micBtn').textContent='⏹';
  document.getElementById('waveform').classList.add('on');
  document.getElementById('micHint').textContent='escuchando… toca para enviar';
}

function stopMic(){
  isListening=false; recognition?.stop();
  document.getElementById('micBtn').classList.remove('on');
  document.getElementById('micBtn').textContent='🎙';
  document.getElementById('waveform').classList.remove('on');
  document.getElementById('micHint').textContent='toca para hablar';
  removeLive();
  if(currentLive.trim()) processInput(currentLive.trim());
  currentLive='';
}

async function handleIntent(p, raw, bubble){
  if(p.intent==='crear_tarea'||p.intent==='crear_recordatorio'){
    const task={
      id:Date.now(), title:p.title||raw, date:p.date||null, time:p.time||null,
      priority:p.priority||'media', project:p.project||null,
      status:'pendiente', created:new Date().toISOString(), gcalId:null
    };
    if(p.subtasks&&p.subtasks.length) task.subtasks=p.subtasks.map((s,i)=>({id:task.id+'_'+i,text:s,done:false}));
    DB.tasks.unshift(task);

    let gcalOk=false;
    if(gcalToken && p.add_to_gcal && task.date){
      const gid = await createGCalEvent(task);
      if(gid){ task.gcalId=gid; gcalOk=true; }
    }

    saveDB(); renderTasks(); renderCal();
    if(p.project) linkToProject(task, p.project);
    scheduleReminder(task);

    // Chips
    const row=document.createElement('div'); row.className='chips';
    if(task.date){ const c=document.createElement('span'); c.className='chip'; c.textContent='📅 '+fmtDate(task.date)+(task.time?' '+task.time:''); row.appendChild(c); }
    if(gcalOk){ const c=document.createElement('span'); c.className='chip g'; c.textContent='✓ Google Calendar'; row.appendChild(c); }
    else if(task.date&&!gcalToken){ const c=document.createElement('span'); c.className='chip warn'; c.textContent='⚡ Conecta Google Cal'; c.onclick=()=>openModal('gcal'); row.appendChild(c); }
    const c2=document.createElement('span'); c2.className='chip'; c2.textContent='Ver tareas'; c2.onclick=()=>gotoPage('tasks',document.querySelectorAll('.nav-btn')[3]); row.appendChild(c2);
    bubble.appendChild(row);
  }
  else if(p.intent==='crear_proyecto'){
    createProject(p.title||raw,'',p.subtasks||[]);
  }
  else if(p.intent==='consulta'){
    const today=new Date().toISOString().split('T')[0];
    const pend=DB.tasks.filter(t=>t.status==='pendiente');
    const hoy=pend.filter(t=>t.date===today);
    let extra='';
    if(hoy.length) extra='<br><br>📋 Hoy tienes '+hoy.length+' tarea'+(hoy.length>1?'s':'')+' pendiente'+(hoy.length>1?'s':'')+':<br>'+hoy.map(t=>'• '+escH(t.title)).join('<br>');
    else if(pend.length) extra='<br><br>Tienes '+pend.length+' tareas pendientes en total.';
    else extra='<br><br>¡No tienes nada pendiente! 🎉';
    bubble.innerHTML+=(extra);
  }
}

function linkToProject(task,name){
  const p=DB.projects.find(x=>x.name.toLowerCase()===name.toLowerCase());
  if(p){ task.project=p.name; if(!p.subtasks) p.subtasks=[]; p.subtasks.push({id:'st_'+task.id,text:task.title,done:false}); saveDB(); renderProjects(); }
}

/* ═══════════════════════════════════
   TTS
═══════════════════════════════════ */
function speak(text){
  if(!text||!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='es-ES'; u.rate=1.05; u.pitch=1;
  const voices=window.speechSynthesis.getVoices();
  const v=voices.find(v=>v.lang==='es-ES'&&v.name.toLowerCase().includes('female'))
    ||voices.find(v=>v.lang==='es-ES')
    ||voices.find(v=>v.lang.startsWith('es'));
  if(v) u.voice=v;
  window.speechSynthesis.speak(u);
}

   NOTIFICATIONS
═══════════════════════════════════ */
function scheduleReminder(task){
  if(!task.date||!task.time) return;
  const at=new Date(task.date+'T'+task.time+':00').getTime()-10*60*1000;
  if(at>Date.now()) DB.reminders.push({id:'r_'+task.id,taskId:task.id,title:task.title,triggerAt:at,fired:false});
  saveDB();
}
function checkReminders(){
  const now=Date.now(); let ch=false;
  DB.reminders.forEach(r=>{ if(!r.fired&&now>=r.triggerAt){ r.fired=true; ch=true; fireReminder(r); }});
  if(ch) saveDB();
}
function fireReminder(r){
  if(Notification.permission==='granted') new Notification('⏰ VOZI',{body:'En 10 min: '+r.title});
  addSystem('🔔 En 10 min: '+r.title);
  speak('Recuerda: '+r.title);
  toast('⏰ '+r.title);
}

/* ═══════════════════════════════════
   CALENDAR RENDER
═══════════════════════════════════ */
function renderCal(){
  const y=calDate.getFullYear(),m=calDate.getMonth();
  document.getElementById('calMonth').textContent=calDate.toLocaleDateString('es-ES',{month:'long',year:'numeric'});
  const first=new Date(y,m,1); let dow=first.getDay()-1; if(dow<0) dow=6;
  const days=new Date(y,m+1,0).getDate();
  const today=new Date().toISOString().split('T')[0];
  const allDates=new Set([...DB.events.map(e=>e.date),...DB.tasks.filter(t=>t.date).map(t=>t.date)]);
  let html='';
  for(let i=0;i<dow;i++){ const d=new Date(y,m,1-dow+i); html+=`<div class="cal-day other">${d.getDate()}</div>`; }
  for(let d=1;d<=days;d++){
    const iso=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cls=['cal-day',iso===today?'today':'',iso===selectedDate?'selected':'',allDates.has(iso)?'has-events':''].filter(Boolean).join(' ');
    html+=`<div class="${cls}" onclick="selectDay('${iso}')">${d}</div>`;
  }
  document.getElementById('calDays').innerHTML=html;
  renderDayEvents(selectedDate);
}
function selectDay(iso){ selectedDate=iso; renderCal(); }
function changeMonth(d){ calDate.setMonth(calDate.getMonth()+d); renderCal(); }
function renderDayEvents(iso){
  const el=document.getElementById('calEvents');
  const evs=[
    ...DB.events.filter(e=>e.date===iso),
    ...DB.tasks.filter(t=>t.date===iso&&t.status==='pendiente').map(t=>({id:'t_'+t.id,title:t.title,time:t.time,type:t.gcalId?'gcal':'tarea',gcalId:t.gcalId}))
  ];
  const label=new Date(iso+'T12:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
  if(!evs.length){ el.innerHTML=`<div class="cal-evlist-hdr">${label}</div><div class="no-ev">Sin eventos este día</div>`; return; }
  evs.sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  el.innerHTML=`<div class="cal-evlist-hdr">${label}</div>`+evs.map(e=>{
    const color=e.type==='gcal'?'var(--green)':e.type==='recordatorio'?'var(--amber)':'var(--accent)';
    return `<div class="ev-item">
      <div class="ev-dot" style="background:${color}"></div>
      <div class="ev-info"><div class="ev-title">${escH(e.title)}</div><div class="ev-time">${e.time||'Todo el día'} · ${e.type}</div></div>
      ${e.type==='gcal'?'<span class="ev-src">Google</span>':''}
    </div>`;
  }).join('');
}

function createProject(name,desc,subtasks){
  if(!name.trim()) return;
  const i=DB.projects.length%PC.length;
  DB.projects.unshift({id:Date.now(),name:name.trim(),desc:desc||'',color:PC[i],icon:PI[i%PI.length],
    subtasks:(subtasks||[]).map((s,j)=>({id:Date.now()+'_'+j,text:s,done:false})),created:new Date().toISOString()});
  saveDB(); renderProjects(); toast('📁 "'+name+'" creado');

function renderProjects(){
  const el=document.getElementById('projList');
  if(!DB.projects.length){ el.innerHTML='<div class="empty"><div class="empty-icon">📁</div>Sin proyectos. Di a VOZI:<br><em>"Crea un proyecto de..."</em></div>'; return; }
  el.innerHTML=DB.projects.map(p=>{
    const tot=(p.subtasks||[]).length, don=(p.subtasks||[]).filter(s=>s.done).length;
    const pct=tot?Math.round(don/tot*100):0;
    const pend=DB.tasks.filter(t=>t.project===p.name&&t.status==='pendiente').length;
    return `<div class="proj-card" id="pc_${p.id}" onclick="toggleProj(${p.id})">
      <div class="proj-top">
        <div class="proj-icon" style="background:${p.color}20">${p.icon}</div>
        <div class="proj-meta"><div class="proj-name">${escH(p.name)}</div><div class="proj-desc">${escH(p.desc||'Sin descripción')}</div></div>
        <button onclick="event.stopPropagation();deleteProj(${p.id})" style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px">✕</button>
      </div>
      <div class="pstats"><span class="pstat ok">✓ ${don}</span><span class="pstat pend">⏳ ${pend}</span></div>
      <div class="pbar"><div class="pbar-fill" style="width:${pct}%"></div></div>
      ${tot?`<div class="stask-list">${(p.subtasks||[]).map(s=>`
        <div class="stask">
          <div class="stask-cb ${s.done?'done':''}" onclick="event.stopPropagation();toggleSub('${p.id}','${s.id}')">${s.done?'✓':''}</div>
          <span class="stask-txt ${s.done?'done':''}">${escH(s.text)}</span>
        </div>`).join('')}</div>`:''}
    </div>`;
  }).join('');
}
function toggleProj(id){ document.getElementById('pc_'+id)?.classList.toggle('expanded'); }
function toggleSub(pid,sid){
  const p=DB.projects.find(x=>String(x.id)===String(pid)); if(!p) return;
  const s=p.subtasks.find(x=>String(x.id)===String(sid)); if(s){ s.done=!s.done; saveDB(); renderProjects(); }

function deleteProj(id){ DB.projects=DB.projects.filter(p=>p.id!==id); saveDB(); renderProjects(); toast('Proyecto eliminado'); }

/* ═══════════════════════════════════
   TASKS
═══════════════════════════════════ */
function renderTasks(){
  const el=document.getElementById('tasksList');
  const today=new Date().toISOString().split('T')[0];
  let tasks=[...DB.tasks];
  if(taskFilter==='hoy') tasks=tasks.filter(t=>t.date===today);
  else if(taskFilter==='pend') tasks=tasks.filter(t=>t.status==='pendiente');
  else if(taskFilter==='alta') tasks=tasks.filter(t=>t.priority==='alta');
  else if(taskFilter==='done') tasks=tasks.filter(t=>t.status==='completada');
  if(!tasks.length){ el.innerHTML='<div class="empty">'+(taskFilter==='all'?'Sin tareas — dile algo a VOZI 🎙':'Sin tareas aquí')+'</div>'; return; }
  el.innerHTML=tasks.map(t=>{
    const ov=t.date&&t.date<today&&t.status==='pendiente';
    const isToday=t.date===today&&t.status==='pendiente';
    return `<div class="task-item ${ov?'overdue':isToday?'due-today':''}" id="task_${t.id}">
      <div class="task-cb ${t.status==='completada'?'done':''}" onclick="toggleTask(${t.id})">${t.status==='completada'?'✓':''}</div>
      <div class="task-body">
        <div class="task-title ${t.status==='completada'?'done':''}">${escH(t.title)}</div>
        <div class="task-meta">
          <span class="tbadge pri-${t.priority}">${t.priority}</span>
          ${t.date?`<span class="date-badge">📅 ${fmtDate(t.date)}${t.time?' '+t.time:''}</span>`:''}
          ${t.project?`<span class="proj-badge">${escH(t.project)}</span>`:''}
          ${t.gcalId?'<span class="gcal-badge">Google Cal</span>':''}
          ${ov?'<span style="font-size:10px;color:var(--red);font-family:var(--mono)">vencida</span>':''}
        </div>
      </div>
      <button class="task-del" onclick="deleteTask(${t.id})">✕</button>
    </div>`;
  }).join('');
}
function toggleTask(id){
  const t=DB.tasks.find(x=>x.id===id); if(!t) return;
  t.status=t.status==='completada'?'pendiente':'completada';
  saveDB(); renderTasks(); renderProjects();
  if(t.status==='completada') toast('✓ '+t.title.substring(0,30));
}
function deleteTask(id){ DB.tasks=DB.tasks.filter(t=>t.id!==id); saveDB(); renderTasks(); renderCal(); }
function filterTasks(f,btn){ taskFilter=f; document.querySelectorAll('.tf').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderTasks(); }

/* ═══════════════════════════════════
   NAV + MODALS + UTILS
═══════════════════════════════════ */
function gotoPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
  if(id==='cal') renderCal();
  if(id==='proj') renderProjects();
  if(id==='tasks') renderTasks();
}
function openModal(id){ document.getElementById('modal-'+id).classList.add('open'); }
function closeModal(id){ document.getElementById('modal-'+id).classList.remove('open'); }

function updateStatus(){
  const both=gcalToken;
  setStatus(both?'Gemini IA + Google Calendar activos':'Gemini IA activa — conecta Google Calendar', both?'ok':'warn');
}
function setStatus(msg,type){ document.getElementById('stext').textContent=msg; document.getElementById('sdot').className='sdot '+(type||'ok'); }
function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(iso){ if(!iso) return ''; return new Date(iso+'T12:00').toLocaleDateString('es-ES',{day:'numeric',month:'short'}); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800); }
